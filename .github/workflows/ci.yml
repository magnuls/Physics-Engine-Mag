name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-and-test:
    name: build + ctest (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ \
            libgl1-mesa-dev \
            libsdl2-dev \
            libglew-dev \
            libassimp-dev \
            libgtest-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  format-check:
    # Non-blocking: verifies src/physics + tests match the repo .clang-format.
    # The inherited engine code (src/core, src/rendering, src/components) is
    # exempted via per-directory DisableFormat overrides, so it is not checked.
    name: clang-format (physics + tests)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src/physics tests -type f \( -name '*.cpp' -o -name '*.h' \) \
            -print0 | xargs -0 clang-format --dry-run --Werror

name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-and-test:
    name: build + ctest (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ \
            libgl1-mesa-dev \
            libsdl2-dev \
            libglew-dev \
            libassimp-dev \
            libgtest-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  format-check:
    # Non-blocking: verifies src/physics + tests match the repo .clang-format.
    # The inherited engine code (src/core, src/rendering, src/components) is
    # exempted via per-directory DisableFormat overrides, so it is not checked.
    name: clang-format (physics + tests)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        # Install the EXACT patch version (18.1.8) via pip, not apt. Ubuntu's
        # `clang-format-18` package floats within the 18.1.x series, and older
        # 18.1.x patches format some constructs (e.g. `{};` empty bodies)
        # differently — which is why a file formatted with 18.1.8 locally was
        # flagged by the runner's apt build. The pip wheel is the same everywhere,
        # so CI now matches the version the files were formatted with, patch-exact.
        # venv keeps it PEP 668-safe and off the system PATH.
        run: |
          python3 -m venv "$RUNNER_TEMP/cf"
          "$RUNNER_TEMP/cf/bin/pip" install --quiet "clang-format==18.1.8"

      - name: Check formatting
        run: |
          find src/physics tests -type f \( -name '*.cpp' -o -name '*.h' \) \
            -print0 | xargs -0 "$RUNNER_TEMP/cf/bin/clang-format" --dry-run --Werror
